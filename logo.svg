<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c18"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <!-- Outer hexagon stroke: cyan → blue -->
    <linearGradient id="hexG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#79c0ff"/>
      <stop offset="45%"  stop-color="#3d8bdb"/>
      <stop offset="100%" stop-color="#1158c7"/>
    </linearGradient>
    <!-- CI text: white → electric blue -->
    <linearGradient id="ciG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0f6ff"/>
      <stop offset="45%"  stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <!-- Hexagon interior fill: deep blue radial -->
    <radialGradient id="hexFillG" cx="50%" cy="46%" r="58%">
      <stop offset="0%"   stop-color="#0e2452" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050c18" stop-opacity="0"/>
    </radialGradient>
    <!-- Core ambient glow -->
    <radialGradient id="coreG" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#1a3c7a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#050c18" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Layer 1: Background ── -->
  <rect width="400" height="400" rx="46" fill="url(#bgG)"/>

  <!-- ── Layer 2: Faint outer rings ── -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="#1f6feb" stroke-width="0.6" opacity="0.12"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#1f6feb" stroke-width="0.4" opacity="0.08"/>

  <!-- ── Layer 3: Hexagon interior gradient fill ── -->
  <!-- Outer hex (r=150): 200,50  329.9,125  329.9,275  200,350  70.1,275  70.1,125 -->
  <polygon points="200,50 329.9,125 329.9,275 200,350 70.1,275 70.1,125"
           fill="url(#hexFillG)"/>

  <!-- ── Layer 4: Core ambient glow ellipse ── -->
  <ellipse cx="200" cy="195" rx="148" ry="132" fill="url(#coreG)"/>

  <!-- ── Layer 5: Outer hexagon glowing border ── -->
  <polygon points="200,50 329.9,125 329.9,275 200,350 70.1,275 70.1,125"
           fill="none" stroke="url(#hexG)" stroke-width="3.5"
           filter="url(#glow)"/>

  <!-- ── Layer 6: Inner hexagon — dashed ── -->
  <!-- Inner hex (r=118): 200,82  302.2,141  302.2,259  200,318  97.8,259  97.8,141 -->
  <polygon points="200,82 302.2,141 302.2,259 200,318 97.8,259 97.8,141"
           fill="none" stroke="#3d8bdb" stroke-width="1.2"
           stroke-dasharray="7 4" opacity="0.38"/>

  <!-- ── Layer 7: Vertex glow dots (outer hex) ── -->
  <circle cx="200"   cy="50"  r="5.5" fill="#79c0ff" filter="url(#glow)"/>
  <circle cx="329.9" cy="125" r="5.5" fill="#79c0ff" filter="url(#glow)"/>
  <circle cx="329.9" cy="275" r="5.5" fill="#79c0ff" filter="url(#glow)"/>
  <circle cx="200"   cy="350" r="5.5" fill="#79c0ff" filter="url(#glow)"/>
  <circle cx="70.1"  cy="275" r="5.5" fill="#79c0ff" filter="url(#glow)"/>
  <circle cx="70.1"  cy="125" r="5.5" fill="#79c0ff" filter="url(#glow)"/>

  <!-- ── Layer 8: Connecting stubs (vertex → toward inner hex) ── -->
  <line x1="200"   y1="50"  x2="200"   y2="77"  stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="329.9" y1="125" x2="307"   y2="138" stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="329.9" y1="275" x2="307"   y2="262" stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="200"   y1="350" x2="200"   y2="323" stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="70.1"  y1="275" x2="93"    y2="262" stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="70.1"  y1="125" x2="93"    y2="138" stroke="#58a6ff" stroke-width="1.5" opacity="0.45"/>

  <!-- ── Layer 9: Edge midpoint accent dots ── -->
  <!-- Midpoints: top-right=(264.95,87.5), right=(329.9,200), bottom-right=(264.95,312.5) -->
  <!-- bottom-left=(135.05,312.5), left=(70.1,200), top-left=(135.05,87.5) -->
  <circle cx="264.95" cy="87.5"  r="3.2" fill="#3d8bdb" opacity="0.7"/>
  <circle cx="329.9"  cy="200"   r="3.2" fill="#3d8bdb" opacity="0.7"/>
  <circle cx="264.95" cy="312.5" r="3.2" fill="#3d8bdb" opacity="0.7"/>
  <circle cx="135.05" cy="312.5" r="3.2" fill="#3d8bdb" opacity="0.7"/>
  <circle cx="70.1"   cy="200"   r="3.2" fill="#3d8bdb" opacity="0.7"/>
  <circle cx="135.05" cy="87.5"  r="3.2" fill="#3d8bdb" opacity="0.7"/>

  <!-- ── Layer 10: CI main text with glow ── -->
  <text x="200" y="210"
        font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="125" font-weight="900"
        fill="url(#ciG)"
        text-anchor="middle" dominant-baseline="middle"
        filter="url(#bigGlow)" letter-spacing="-2">CI</text>

  <!-- ── Layer 11: Divider ── -->
  <line x1="148" y1="273" x2="252" y2="273" stroke="#3d8bdb" stroke-width="0.8" opacity="0.45"/>

  <!-- ── Layer 12: Name label ── -->
  <text x="200" y="293"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="18" font-weight="300"
        fill="#7d8ca8" text-anchor="middle" letter-spacing="8">COSTEL I.</text>

  <!-- ── Layer 13: Corner brackets ── -->
  <path d="M 22 56 L 22 22 L 56 22"   fill="none" stroke="#3d8bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M 378 56 L 378 22 L 344 22" fill="none" stroke="#3d8bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M 22 344 L 22 378 L 56 378" fill="none" stroke="#3d8bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M 378 344 L 378 378 L 344 378" fill="none" stroke="#3d8bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>
